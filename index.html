<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellingen Zoeken</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a222c; --panel2:#212c38; --line:#2c3a49;
    --txt:#e6edf3; --muted:#8b9bb0; --accent:#3b82f6;
    --ok:#22c55e; --chip:#26333f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--txt);
    font-size:14px; min-height:100vh; display:flex; flex-direction:column; align-items:center;
  }
  .wrap{width:100%; max-width:820px; padding:0 20px; display:flex; flex-direction:column;
        align-items:center; flex:1; transition:padding-top .25s}
  .wrap.empty-state{justify-content:center}
  .wrap.has-results{padding-top:34px}
  .brand{font-size:13px; color:var(--muted); letter-spacing:.4px; margin-bottom:18px; text-align:center}
  .brand b{color:var(--txt); font-weight:600}

  .searchbox{position:relative; width:100%}
  .searchbox svg{position:absolute; left:20px; top:50%; transform:translateY(-50%); opacity:.45}
  #q{
    width:100%; padding:20px 22px 20px 56px; font-size:19px; border-radius:16px;
    border:1px solid var(--line); background:var(--panel); color:var(--txt);
    box-shadow:0 6px 22px rgba(0,0,0,.28);
  }
  #q::placeholder{color:var(--muted)}
  #q:focus{outline:none; border-color:var(--accent); box-shadow:0 6px 26px rgba(59,130,246,.22)}
  #clear{position:absolute; right:14px; top:50%; transform:translateY(-50%); display:none;
    background:var(--chip); color:var(--txt); border:none; width:30px; height:30px; border-radius:50%;
    cursor:pointer; font-size:16px; line-height:1}
  #clear:hover{background:#31414f}

  .sub{margin-top:12px; font-size:12px; color:var(--muted); text-align:center; display:flex; gap:10px;
       align-items:center; justify-content:center; flex-wrap:wrap}
  .sub a{color:var(--accent); cursor:pointer; text-decoration:none}
  .sub a:hover{text-decoration:underline}
  .sub .dot{opacity:.4}
  input[type=file]{display:none}

  .results{width:100%; margin-top:22px; margin-bottom:40px}
  .hit{
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:13px 16px;
    margin-bottom:10px; cursor:pointer; transition:border-color .12s,background .12s;
  }
  .hit:hover{border-color:#3a4a5c; background:var(--panel2)}
  .hit .top{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap}
  .hit .proj{font-weight:700; color:var(--accent); font-family:"Consolas",monospace; font-size:14px}
  .hit .klant{font-weight:600; font-size:15px}
  .hit .status{margin-left:auto; font-size:11px; font-weight:600; padding:2px 9px; border-radius:20px; background:var(--chip); color:var(--muted); white-space:nowrap}
  .hit .status.st-Afwerking{background:#2b3a2e;color:#86efac}
  .hit .status.st-Productie{background:#2a3550;color:#93c5fd}
  .hit .status.st-Uitvoering{background:#3a2f22;color:#fcd34d}
  .hit .line2{margin-top:6px; font-size:12.5px; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap}
  .hit .line2 span b{color:var(--txt); font-weight:600; font-family:"Consolas",monospace}
  .hit .oms{margin-top:7px; font-size:12.5px; color:var(--muted); line-height:1.45}
  .hit .detail{margin-top:12px; padding-top:12px; border-top:1px solid var(--line);
    display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:5px 20px}
  .hit .detail div{font-size:12px; line-height:1.55}
  .hit .detail .k{color:var(--muted); margin-right:5px}
  mark{background:rgba(59,130,246,.4); color:inherit; border-radius:2px; padding:0 1px}

  .info{text-align:center; color:var(--muted); font-size:13px; margin-top:30px; line-height:1.6}
  .info b{color:var(--txt)}
  .load-btn{margin-top:16px; font-size:14px; cursor:pointer; border:none; border-radius:10px;
    padding:12px 20px; background:var(--accent); color:#fff; font-weight:600}
  .load-btn:hover{background:#2563eb}

  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--panel);
    border:1px solid var(--line); padding:11px 18px; border-radius:10px; font-size:13px;
    box-shadow:0 8px 24px rgba(0,0,0,.4); opacity:0; transition:opacity .25s; pointer-events:none; z-index:50}
  .toast.show{opacity:1}
  .toast.err{border-color:#ef4444}
  body.drag::after{content:"Laat het XML-bestand los"; position:fixed; inset:0; background:rgba(15,20,25,.92);
    display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--accent);
    border:3px dashed var(--accent); z-index:100}
</style>
</head>
<body>
<div class="wrap empty-state" id="wrap">
  <div class="brand"><b>Bestellingen zoeken</b> &middot; Schiffeleers Glas</div>

  <div class="searchbox">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="text" placeholder="Typ eender wat: projectnr, klant, bestelbon, order, leverancier&hellip;" autocomplete="off" autofocus disabled>
    <button id="clear" onclick="clearQ()">&times;</button>
  </div>

  <div class="sub" id="sub"></div>

  <div class="results" id="results"></div>

  <div class="info" id="info">
    <div>Nog geen data geladen.</div>
    <button class="load-btn" onclick="pick()">&#128193; Bestellingen-XML opladen</button>
    <div style="margin-top:12px; font-size:12px">of sleep <b>Table_REQ_Bestelling_Overzichtlijst.xml</b> in dit venster</div>
  </div>

  <input type="file" id="file" accept=".xml">
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = "alu_bestellingen";
const ALL_FIELDS = ["IDBestellingen","IDProjectnr","Besteldatum","Naam","Bestelbonnr","Leverancier","Omschrijving","Leverdatum","Ordernummer","Werfnaam","Werfpostcode","Werfgemeente","Projectstatus","Hoeveelheid","Aantal_stuks","Geleverd","Orderbevestigingontvangen","Leveringopwerf","Levering_volledig","Aankoopprijs_orderbevestiging","Aankooprijs_factuur","GevraagdeLeverdatum","BevestigdeLeverdatum","TypeMateriaal"];
const MAX = 60;

let DATA = [];
let expanded = new Set();

const $ = id => document.getElementById(id);
function norm(s){return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function toast(m,err){const t=$("toast");t.textContent=m;t.className="toast show"+(err?" err":"");clearTimeout(t._t);t._t=setTimeout(()=>t.className="toast",2600);}

function buildHay(r){ return norm(ALL_FIELDS.map(f=>r[f]||"").join(" ")); }

function save(){
  try{ localStorage.setItem(KEY, JSON.stringify({updatedAt:Date.now(), records:DATA.map(r=>{const c={...r};delete c._hay;return c;})})); }
  catch(e){ toast("Kon niet bewaren (opslag vol) \u2014 data werkt wel deze sessie.", true); }
}
function load(){
  try{
    const o = JSON.parse(localStorage.getItem(KEY)||"null");
    if(!o||!o.records||!o.records.length) return false;
    DATA = o.records; DATA.forEach(r=>r._hay=buildHay(r));
    setSub(o.updatedAt); return true;
  }catch(e){ return false; }
}
function setSub(ts){
  const d = ts? new Date(ts):null;
  const when = d ? d.toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+d.toLocaleTimeString("nl-BE",{hour:"2-digit",minute:"2-digit"}) : "\u2014";
  $("sub").innerHTML = "<span><b>"+DATA.length.toLocaleString("nl-BE")+"</b> bestellingen</span><span class='dot'>\u00b7</span><span>geladen "+when+"</span><span class='dot'>\u00b7</span><a onclick='pick()'>nieuwe export opladen</a>";
}

function parseXML(text){
  const doc = new DOMParser().parseFromString(text,"application/xml");
  if(doc.querySelector("parsererror")) throw new Error("Ongeldige XML");
  const nodes = doc.getElementsByTagName("Table_REQ_Bestelling_Overzichtlijst");
  if(!nodes.length) throw new Error("Geen bestelling-records gevonden");
  const out=[];
  for(const n of nodes){ const rec={}; for(const c of n.children) rec[c.tagName]=(c.textContent||"").trim(); out.push(rec); }
  return out;
}
function pick(){ $("file").click(); }
function handleFile(file){
  if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const text=new TextDecoder("iso-8859-1").decode(rd.result);
      DATA=parseXML(text); DATA.forEach(r=>r._hay=buildHay(r));
      save(); setSub(Date.now()); enable(); render();
      toast(DATA.length.toLocaleString("nl-BE")+" bestellingen geladen \u2713");
    }catch(e){ toast("Fout: "+e.message,true); }
  };
  rd.onerror=()=>toast("Kon bestand niet lezen",true);
  rd.readAsArrayBuffer(file);
}
function enable(){ $("q").disabled=false; $("info").style.display="none"; $("q").focus(); }

function clearQ(){ $("q").value=""; render(); $("q").focus(); }

function hl(text, terms){
  let s=esc(text); if(!terms.length) return s;
  for(const t of terms){ if(!t)continue;
    const re=new RegExp("("+t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");
    s=s.replace(re,"<mark>$1</mark>");
  }
  return s;
}
function render(){
  const raw=$("q").value.trim();
  const terms=norm(raw).split(/\s+/).filter(Boolean);
  $("clear").style.display = raw ? "block":"none";
  const wrap=$("wrap"), res=$("results");

  if(!terms.length){
    wrap.className="wrap empty-state"; res.innerHTML=""; return;
  }
  wrap.className="wrap has-results";

  const rows=DATA.filter(r=>terms.every(t=>r._hay.includes(t)));
  if(!rows.length){
    res.innerHTML='<div class="info">Geen bestellingen gevonden voor \u201c'+esc(raw)+'\u201d.</div>'; return;
  }
  const shown=rows.slice(0,MAX);
  let html='<div style="font-size:12px;color:var(--muted);margin:0 2px 12px">'+rows.length.toLocaleString("nl-BE")+' resulta'+(rows.length===1?"at":"ten")+(rows.length>MAX?' \u00b7 eerste '+MAX+' getoond':'')+'</div>';

  for(const r of shown){
    const id=r.IDBestellingen||(r.IDProjectnr+"|"+r.Bestelbonnr+"|"+r.Ordernummer);
    const open=expanded.has(id);
    const st=r.Projectstatus||"";
    const lev=r.Leverdatum||r.BevestigdeLeverdatum||"";
    html+='<div class="hit" data-id="'+esc(id)+'">'+
      '<div class="top">'+
        '<span class="proj">'+hl(r.IDProjectnr||"",terms)+'</span>'+
        '<span class="klant">'+hl(r.Naam||"",terms)+'</span>'+
        (st?'<span class="status st-'+esc(st.replace(/\s+/g,""))+'">'+esc(st)+'</span>':'')+
      '</div>'+
      '<div class="line2">'+
        (r.Bestelbonnr?'<span>Bestelbon: <b>'+hl(r.Bestelbonnr,terms)+'</b></span>':'')+
        (r.Ordernummer?'<span>Order: <b>'+hl(r.Ordernummer,terms)+'</b></span>':'')+
        (r.Leverancier?'<span>'+hl(r.Leverancier,terms)+'</span>':'')+
        (r.TypeMateriaal?'<span>'+esc(r.TypeMateriaal)+'</span>':'')+
        (r.Besteldatum?'<span>Besteld: <b>'+esc(r.Besteldatum)+'</b></span>':'')+
        (lev?'<span>Leverdatum: <b>'+esc(lev)+'</b></span>':'')+
        (r.Werfgemeente?'<span>'+hl(r.Werfgemeente,terms)+'</span>':'')+
      '</div>'+
      (r.Omschrijving?'<div class="oms">'+hl(r.Omschrijving,terms)+'</div>':'')+
      (open?('<div class="detail">'+ALL_FIELDS.filter(f=>(r[f]||"").trim()!=="").map(f=>'<div><span class="k">'+f+':</span>'+esc(r[f])+'</div>').join("")+'</div>'):'')+
    '</div>';
  }
  res.innerHTML=html;
  res.querySelectorAll(".hit").forEach(el=>el.onclick=()=>{
    const id=el.dataset.id; if(expanded.has(id))expanded.delete(id);else expanded.add(id); render();
  });
}

// events
$("file").addEventListener("change",e=>handleFile(e.target.files[0]));
$("q").addEventListener("input",render);
["dragover","dragenter"].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();document.body.classList.add("drag");}));
document.addEventListener("dragleave",e=>{if(e.relatedTarget===null)document.body.classList.remove("drag");});
document.addEventListener("drop",e=>{e.preventDefault();document.body.classList.remove("drag");const f=e.dataTransfer.files[0];if(f)handleFile(f);});

// init
if(load()){ enable(); render(); }
</script>
</body>
</html>
